<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SCMS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0B3B5C;
            --primary-light: #1E4F6E;
            --secondary: #2E7D32;
            --accent: #F5B041;
            --danger: #DC3545;
            --dark: #1A1E24;
            --gray-dark: #2C3E50;
            --gray: #546E7A;
            --gray-light: #B0BEC5;
            --light: #F4F7F9;
            --white: #FFFFFF;
            --border-radius: 12px;
            --box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.1);
            --transition: all 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background: linear-gradient(145deg, var(--primary), #1E4F6E);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Back Button */
        .back-button {
            position: absolute;
            top: 30px;
            left: 30px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: white;
            font-weight: 500;
            padding: 12px 24px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            transition: var(--transition);
            border: 1px solid rgba(255,255,255,0.2);
            text-decoration: none;
        }

        .back-link:hover {
            background: rgba(255,255,255,0.25);
            transform: translateX(-5px);
        }

        .back-link i {
            font-size: 14px;
        }

        /* Login Container */
        .login-container {
            width: 100%;
            max-width: 450px;
        }

        /* Logo Section */
        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            background: white;
            padding: 15px 35px;
            border-radius: 60px;
            box-shadow: var(--box-shadow);
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(145deg, var(--primary), #1E4F6E);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            box-shadow: 0 10px 15px -8px var(--primary);
        }

        .logo-text h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            line-height: 1.2;
        }

        .logo-text p {
            font-size: 12px;
            font-weight: 500;
            color: var(--gray);
            letter-spacing: 0.3px;
        }

        /* Login Card */
        .login-card {
            background: white;
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header h2 {
            font-size: 32px;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .login-header p {
            color: var(--gray);
            font-size: 15px;
        }

        /* Error Message */
        .error-message {
            background: rgba(220,53,69,0.1);
            color: var(--danger);
            padding: 15px 20px;
            border-radius: 16px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 5px solid var(--danger);
            font-size: 14px;
        }

        .error-message i {
            font-size: 18px;
        }

        /* Form */
        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 10px;
            color: var(--dark);
            font-size: 14px;
        }

        .form-group label i {
            color: var(--primary);
            margin-right: 8px;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 18px;
            color: var(--primary);
            font-size: 18px;
            opacity: 0.7;
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            border: 2px solid var(--gray-light);
            border-radius: 20px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: var(--transition);
            background: var(--light);
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(11,59,92,0.1);
            background: white;
        }

        .input-group input::placeholder {
            color: var(--gray-light);
            font-style: italic;
        }

        .toggle-password {
            position: absolute;
            right: 18px;
            color: var(--gray);
            cursor: pointer;
            font-size: 18px;
            transition: var(--transition);
        }

        .toggle-password:hover {
            color: var(--primary);
        }

        /* Remember Me & Forgot Password */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .remember-me label {
            color: var(--gray);
            font-size: 14px;
            cursor: pointer;
        }

        .forgot-password {
            color: var(--primary);
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            transition: var(--transition);
        }

        .forgot-password:hover {
            color: var(--primary-light);
            text-decoration: underline;
        }

        /* Login Button */
        .login-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: var(--transition);
            box-shadow: 0 8px 16px -6px rgba(11, 59, 92, 0.3);
            margin-bottom: 25px;
        }

        .login-btn:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 12px 20px -8px rgba(11, 59, 92, 0.4);
        }

        .login-btn i {
            font-size: 18px;
        }

        /* Register Link */
        .register-link {
            text-align: center;
            color: var(--gray);
            font-size: 14px;
        }

        .register-link a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
            transition: var(--transition);
        }

        .register-link a:hover {
            color: var(--primary-light);
            text-decoration: underline;
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 30px;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
        }

        .login-footer a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
            transition: var(--transition);
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .back-button {
                top: 20px;
                left: 20px;
            }
            
            .back-link {
                padding: 8px 16px;
                font-size: 13px;
            }
            
            .logo {
                padding: 12px 25px;
            }
            
            .logo-icon {
                width: 40px;
                height: 40px;
                font-size: 22px;
            }
            
            .logo-text h1 {
                font-size: 22px;
            }
            
            .login-card {
                padding: 30px 20px;
            }
            
            .login-header h2 {
                font-size: 28px;
            }
            
            .form-options {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <!-- Back Button (Top Left) -->
    <div class="back-button">
        <a href="javascript:history.back()" class="back-link">
            <i class="fas fa-arrow-left"></i>
            Back
        </a>
    </div>

    <div class="login-container">
        <!-- Logo Section -->
        <div class="logo-section">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-tools"></i>
                </div>
                <div class="logo-text">
                    <h1>EasyWork</h1>

                </div>
            </div>
        </div>

        <!-- Login Card -->
        <div class="login-card">
            <div class="login-header">
                <h2>Welcome Back!</h2>
                <p>Please login to your account</p>
            </div>

            <!-- Error Message (commented out as in your original) -->
            {% comment %} 
            {% if m %}
            <div class="error-message">
                <i class="fas fa-exclamation-circle"></i>
                {{ m }}
            </div>
            {% endif %} 
            {% endcomment %}

            <!-- Login Form -->
            <form method="post">
                {% csrf_token %}
                
                <!-- Username Field -->
                <div class="form-group">
                    <label>
                        <i class="fas fa-user"></i>
                        Username
                    </label>
                    <div class="input-group">
                        <i class="fas fa-user input-icon"></i>
                        <input 
                            type="text" 
                            name="username" 
                            placeholder="Enter your username"
                            required>
                    </div>
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <label>
                        <i class="fas fa-lock"></i>
                        Password
                    </label>
                    <div class="input-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input 
                            type="password" 
                            name="password" 
                            id="passwordInput"
                            placeholder="Enter your password"
                            required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
                    </div>
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="form-options">
                    <div class="remember-me">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember">Remember me</label>
                    </div>
{#                    <a href="#" class="forgot-password">Forgot Password?</a>#}
                </div>

                <!-- Login Button -->
                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i>
                    Login
                </button>

                <!-- Register Link -->
                <div class="register-link">
                    Don't have an account? 
                    <a href="/registration_customer/registration/">Register here</a>
                </div>
            </form>
        </div>

        <!-- Footer -->
        <div class="login-footer">
            <p>© 2025 SCMS. All rights reserved.</p>
            <p>
                <a href="#">Privacy Policy</a> • 
                <a href="#">Terms of Service</a> • 
                <a href="#">Contact</a>
            </p>
        </div>
    </div>

    <script>
        // Toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById('passwordInput');
            const toggleIcon = document.querySelector('.toggle-password');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        // Form validation (optional)
        const loginForm = document.querySelector('form');
        if (loginForm) {
            loginForm.addEventListener('submit', function(e) {
                const username = document.querySelector('input[name="username"]');
                const password = document.querySelector('input[name="password"]');
                
                if (!username.value.trim()) {
                    e.preventDefault();
                    alert('Please enter your username');
                    username.focus();
                    return;
                }
                
                if (!password.value.trim()) {
                    e.preventDefault();
                    alert('Please enter your password');
                    password.focus();
                    return;
                }
            });
        }


    </script>
</body>
</html>
