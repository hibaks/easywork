<!DOCTYPE html>
<html>
<head>
    <title>Worker Requests</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f6;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 85%;
            margin: 50px auto;
        }

        .header {
            margin-bottom: 20px;
        }

        .header h2 {
            font-size: 28px;
            color: #1c2b36;
        }

        .card {
            background: #ffffff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background-color: #0f3b57;
            color: white;
            padding: 12px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        tr:hover {
            background-color: #f5f9fc;
        }

        .no-data {
            text-align: center;
            padding: 30px;
            color: #888;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 18px;
            background: #dfe7ec;
            border-radius: 25px;
            text-decoration: none;
            color: #333;
            font-weight: 500;
        }

        .back-btn:hover {
            background: #cfd8df;
        }

        .btn {
            padding: 7px 14px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 14px;
            margin: 3px;
            display: inline-block;
        }

        .accept-btn {
            background-color: #28a745;
            color: white;
        }

        .accept-btn:hover {
            background-color: #218838;
        }

        .reject-btn {
            background-color: #dc3545;
            color: white;
        }

        .reject-btn:hover {
            background-color: #c82333;
        }
    </style>
</head>

<body>

<div class="container">

    <a href="/temp/worker/" class="back-btn">← Back to Dashboard</a>

    <div class="header">
        <h2>Worker Booking Requests</h2>
    </div>

    <div class="card">

        {% if oo %}
        <table>
            <tr>
                <th>Service</th>
                <th>Description</th>
                <th>Date</th>
                <th>Time</th>
                <th>Status</th>
                <th>Action</th>
            </tr>

            {% for i in oo %}
            <tr>
                <td>{{ i.service.service_name }}</td>
                <td>{{ i.service.description }}</td>
                <td>{{ i.date }}</td>
                <td>{{ i.time }}</td>
                <td>{{ i.status }}</td>
                <td>
                    <a href="/booking/accept/{{ i.book_id }}" class="btn accept-btn">Accept</a>
                    <a href="/booking/reject/{{ i.book_id }}" class="btn reject-btn">Reject</a>
                </td>
            </tr>
            {% endfor %}
        </table>
        {% else %}
            <div class="no-data">No booking requests available.</div>
        {% endif %}

    </div>

</div>

</body>
</html>
