<!DOCTYPE html>
<html>
<head>
    <title>Complaint Replies</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f6;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 80%;
            margin: 50px auto;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .header h2 {
            font-size: 28px;
            color: #1c2b36;
        }

        .card {
            background: #ffffff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background-color: #0f3b57;
            color: white;
            padding: 12px;
            border-radius: 8px 8px 0 0;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        tr:hover {
            background-color: #f5f9fc;
        }

        .no-data {
            text-align: center;
            padding: 30px;
            color: #888;
            font-size: 16px;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 18px;
            background: #dfe7ec;
            border-radius: 25px;
            text-decoration: none;
            color: #333;
            font-weight: 500;
        }

        .back-btn:hover {
            background: #cfd8df;
        }
    </style>
</head>

<body>

<div class="container">

    <a href="/temp/worker/" class="back-btn">← Back to Dashboard</a>

    <div class="header">
        <h2>Complaint Replies</h2>
    </div>

    <div class="card">

        {% if k %}
        <table>
            <tr>
                <th>Complaint</th>
                <th>Reply</th>
                <th>Date</th>
            </tr>

            {% for i in k %}
            <tr>
                <td>{{ i.complaint }}</td>
                <td>{{ i.reply|default:"Pending..." }}</td>
                <td>{{ i.date }}</td>
            </tr>
            {% endfor %}

        </table>
        {% else %}
            <div class="no-data">No complaints found.</div>
        {% endif %}

    </div>

</div>

</body>
</html>
